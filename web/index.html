<!DOCTYPE html>

<head>

<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.ico">

<title>The Sweep — World Cup 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900&family=Barlow+Semi+Condensed:wght@500;600;700;800&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script>
  /* Standalone Android PWAs report 100dvh as the full window incl. the system
     gesture bar, so the shell overflows and the bottom nav drops below the fold.
     window.innerHeight excludes that bar — pin the shell to it. Pre-paint to
     avoid a layout jump; visualViewport keeps it correct through keyboard/rotate. */
  (function () {
    var set = function () {
      /* innerHeight excludes the Android system bar (the reason we don't use
         100dvh); visualViewport.height also shrinks when the on-screen keyboard
         opens. Take the smaller so the shell tracks the *visible* area — bottom
         sheets stay above the keyboard, and the layout restores when it closes. */
      var vv = window.visualViewport;
      var h = vv ? Math.min(window.innerHeight, vv.height) : window.innerHeight;
      document.documentElement.style.setProperty('--app-height', h + 'px');
    };
    set();
    window.addEventListener('resize', set);
    window.addEventListener('orientationchange', set);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', set);
      window.visualViewport.addEventListener('scroll', set);
    }
  })();
</script>
</head>
<body>
  <div id="root">
    <div class="device">
      <div id="appmount" style="height:100%;"></div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
